<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>To-Do List</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="todo-container">
      <div id="header">
        <h1>To-Do List</h1>
        <div class="subtitle">small steps, cozy progress</div>
      </div>

      <div id="todo-form">
        <input
          type="text"
          class="input-item"
          name="input_box"
          id="input-box"
          placeholder="Add a task..."
        />
        <button id="input-button" onclick="addTask()">Add</button>
      </div>

      <h2>Task List</h2>
      <ul id="list-container"></ul>

      <hr />

      <div class="counter-container">
        <div id="task-counters">
          Completed: <span id="completed-counter">0</span> &nbsp;|&nbsp; Uncompleted:
          <span id="uncompleted-counter">0</span>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
